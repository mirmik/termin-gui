site_name: termin-gui
site_description: Widget-based UI framework documentation
repo_url: https://github.com/rfmeas/termin-gui
repo_name: rfmeas/termin-gui
theme:
  name: material
  language: ru
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Главная: index.md
  - Быстрый старт: getting-started.md
  - Core API: core-api.md
  - Layout и контейнеры: widgets-layout.md
  - Базовые контролы: widgets-basic.md
  - Ввод и редактирование: widgets-input.md
  - Данные и навигация: widgets-data-nav.md
  - Диалоги и overlay: widgets-dialogs.md
  - Canvas и Viewport3D: widgets-canvas-viewport.md
