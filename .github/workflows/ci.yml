name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  LD_LIBRARY_PATH: /opt/termin/lib

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download termin-graphics SDK
        env:
          GH_TOKEN: ${{ secrets.CLONETOKEN }}
        run: |
          gh release download sdk-latest -R ${{ github.repository_owner }}/termin-graphics -p sdk-graphics.tar.gz -D /tmp
          sudo tar xzf /tmp/sdk-graphics.tar.gz -C /

      - name: Install Python dependencies
        run: pip install --upgrade pip setuptools wheel nanobind pytest numpy Pillow PyYAML /opt/termin/wheels/*.whl

      - name: Install tcgui package
        run: pip install -e .

      - name: Run Python tests
        run: pytest -q python/tests
